<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuVoice Pro - Library Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        .highlight { background-color: #1e40af; color: white; border-radius: 4px; padding: 2px 0; transition: all 0.2s; }
        #viewer { white-space: pre-wrap; overflow-y: auto; }
        [contenteditable]:focus { outline: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        .loading-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 10; border-radius: 1rem; }
        /* Basic Reset & Positioning */
        #chat-circle {
            position: fixed;
            bottom: 50px;
            right: 50px;
            background: #4A90E2;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            color: white;
            text-align: center;
            line-height: 60px;
            cursor: pointer;
            box-shadow: 0px 3px 16px 0px rgba(0, 0, 0, 0.2);
        }

        .chat-box {
            display: none; /* Hidden by default */
            position: fixed;
            right: 30px;
            bottom: 50px;
            width: 350px;
            max-width: 85vw;
            max-height: 500px;
            background: #bf68fd;
            color: #374151;
            border-radius: 5px;
            box-shadow: 0px 5px 35px 9px rgba(0,0,0,0.1);
        }

        .chat-box-header {
            background: #4A90E2;
            padding: 15px;
            color: white;
            font-weight: bold;
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
        }

        .chat-box-toggle {
            float: right;
            cursor: pointer;
        }

        .chat-logs {
            padding: 15px;
            height: 350px;
            overflow-y: auto;
        }

        .chat-input {
            padding: 15px;
            border-top: 1px solid #151515;
        }

        #chat-input {
            width: 80%;
            border: none;
            outline: none;
        }
    
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <div class="lg:col-span-3 bg-gray-900 border border-gray-800 rounded-2xl shadow-2xl overflow-hidden flex flex-col relative">
            <div id="loader" class="loading-overlay hidden">
                <div class="text-blue-400 font-bold flex flex-col items-center">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-400 mb-2"></div>
                    Preparing Document...
                </div>
            </div>

            <div class="p-6 border-b border-gray-800 flex flex-wrap justify-between items-center bg-gray-900/50 gap-4">
                <h1 class="text-xl font-bold text-blue-400">🔊 DocuVoice Pro</h1>
                <div class="flex flex-wrap gap-2">
                    <input type="file" id="fileInput" accept=".pdf,.docx,.txt" class="hidden">
                    <label for="fileInput" class="bg-gray-800 hover:bg-gray-700 border border-gray-700 px-3 py-2 rounded-lg cursor-pointer text-xs font-bold transition">📁 Upload</label>
                    <button onclick="downloadText()" class="bg-gray-800 hover:bg-gray-700 border border-gray-700 px-3 py-2 rounded-lg text-xs font-bold transition">📥 Download</button>
                    <select id="langSelect" class="bg-gray-800 text-xs border border-gray-700 rounded-lg px-2 py-2 outline-none">
                        <option value="mr">Marathi</option>
                        <option value="en" selected>English</option>
                    </select>
                    <button onclick="translateText()" class="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-lg text-xs font-bold transition">🌐 Translate</button>
                </div>
            </div>

            <div id="viewer" contenteditable="true" 
                 class="w-full h-[400px] p-8 bg-gray-950 text-lg leading-relaxed text-gray-300 focus:ring-1 focus:ring-blue-900 custom-scrollbar">Welcome. Upload a file or select from the Library.</div>

            <div class="px-8 py-4 bg-gray-900 border-t border-gray-800">
                <input type="range" id="progressSlider" min="0" max="100" value="0" class="w-full h-1.5 bg-gray-800 rounded-lg appearance-none cursor-pointer accent-blue-500 mb-6">
                
                <div class="flex flex-wrap items-center justify-between gap-6">
                    <div class="flex gap-2 w-full md:w-auto">
                        <button onclick="togglePlay()" id="playBtn" class="bg-green-600 hover:bg-green-700 px-8 py-3 rounded-xl font-bold flex-1 md:flex-none transition">▶ Play</button>
                        <button onclick="stopTTS()" class="bg-red-600 hover:bg-red-700 px-6 py-3 rounded-xl transition">Stop</button>
                    </div>

                    <div class="flex items-center gap-4 bg-gray-800 px-4 py-2 rounded-xl border border-gray-700">
                        <span id="speedValue" class="text-blue-400 font-mono font-bold w-10">1.0x</span>
                        <input type="range" id="speedRange" min="0.5" max="2.5" step="0.1" value="1" class="w-24 h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
                    </div>

                    <button onclick="saveToQueue()" class="bg-blue-600 hover:bg-blue-500 px-4 py-3 rounded-xl text-sm font-bold transition">💾 Save Library</button>
                </div>
            </div>
        </div>

        <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 flex flex-col h-full">
            <h2 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4">Saved Items</h2>
            <div id="queueList" class="space-y-3 overflow-y-auto custom-scrollbar flex-1 pr-2">
                <p class="text-gray-600 text-xs italic">No saved items.</p>
            </div>
        </div>
    </div>
    <!-- Chatbot Toggle Button -START -->
    <div id="chat-circle" class="btn btn-raised">
        <div id="chat-overlay"></div>
        <span class="chat-icon">💬</span>
    </div>

    <!-- Chat Window -->
    <div class="chat-box">
        <div class="chat-box-header">
            AI Assistant
            <span class="chat-box-toggle">×</span>
        </div>
        <div class="chat-box-body">
            <div class="chat-logs">
                <!-- Messages will appear here -->
            </div>
        </div>
        <div class="chat-input">
            <form>
                <input type="text" id="chat-input" placeholder="Send a message..."/>
                <button type="submit" class="chat-submit" id="chat-submit">➤</button>
            </form>
        </div>
    </div>
    <!-- Chatbot Toggle Button -END -->
    <script>
        const viewer = document.getElementById('viewer');
        const queueList = document.getElementById('queueList');
        const loader = document.getElementById('loader');
        const synth = window.speechSynthesis;
        let originalText = ""; 
        let currentIdx = 0;
        let utterance = null;

        const sleep = ms => new Promise(res => setTimeout(res, ms));
        function beautifyText(text) {
            return text ? text.split('\n').map(l => l.trim()).filter(l => l !== "").join('\n\n') : "";
        }

        // --- UPDATED LOAD FROM LIBRARY ---
        let library = JSON.parse(localStorage.getItem('docuvoice_library') || '[]');

        async function loadFromLibrary(id) {
            // 1. Show "Please Wait" loader
            loader.classList.remove('hidden');
            
            // 2. Clear current speech immediately
            stopTTS(); 

            // Simulate a tiny delay to ensure the browser clears memory/UI
            await sleep(400);

            const item = library.find(x => x.id === id);
            if (item) {
                // 3. Set text and master reference
                viewer.innerText = item.content;
                originalText = item.content;
                
                // 4. Reset position
                currentIdx = 0;
                document.getElementById('progressSlider').value = 0;
                
                console.log("Document synced. Ready to play.");
            }
            
            // 5. Hide loader
            loader.classList.add('hidden');
        }

        function saveToQueue() {
            const text = viewer.innerText;
            if (text.length < 5) return;
            const name = prompt("Name this document:", `Doc ${library.length + 1}`);
            if (name) {
                library.push({ id: Date.now(), name, content: text });
                localStorage.setItem('docuvoice_library', JSON.stringify(library));
                renderLibrary();
            }
        }

        function removeFromLibrary(id) {
            library = library.filter(x => x.id !== id);
            localStorage.setItem('docuvoice_library', JSON.stringify(library));
            renderLibrary();
        }

        function renderLibrary() {
            if (library.length === 0) {
                queueList.innerHTML = `<p class="text-gray-600 text-xs italic">Empty.</p>`;
                return;
            }
            queueList.innerHTML = library.map(item => `
                <div class="bg-gray-800 border border-gray-700 p-3 rounded-lg flex flex-col gap-2">
                    <span class="text-sm font-semibold text-gray-200 truncate">${item.name}</span>
                    <div class="flex gap-2">
                        <button onclick="loadFromLibrary(${item.id})" class="text-[10px] bg-blue-900/50 text-blue-300 px-3 py-1 rounded hover:bg-blue-800 transition">Load</button>
                        <button onclick="removeFromLibrary(${item.id})" class="text-[10px] bg-red-900/50 text-red-300 px-3 py-1 rounded hover:bg-red-800 transition">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        // --- TTS ENGINE ---
        function startSpeaking(fromIndex = 0) {
            synth.cancel();
            
            // Ensure originalText is up to date with what the user sees
            originalText = viewer.innerText;
            if (!originalText.trim()) return;

            utterance = new SpeechSynthesisUtterance(originalText.slice(fromIndex));
            utterance.rate = parseFloat(document.getElementById('speedRange').value);
            
            const lang = document.getElementById('langSelect').value;
            const voice = synth.getVoices().find(v => v.lang.includes(lang));
            if (voice) utterance.voice = voice;

            utterance.onboundary = (e) => {
                if (e.name === 'word') {
                    currentIdx = fromIndex + e.charIndex;
                    document.getElementById('progressSlider').value = (currentIdx / originalText.length) * 100;
                    highlightText(currentIdx, e.charLength || 1);
                }
            };

            utterance.onend = () => {
                viewer.innerHTML = originalText; 
                updateBtn(false);
            };

            synth.speak(utterance);
            updateBtn(true);
        }

        function highlightText(charIndex, length) {
            const text = viewer.innerText;
            let start = text.lastIndexOf('.', charIndex) + 1;
            let end = text.indexOf('.', charIndex + length);
            if (end === -1) end = text.length;
            viewer.innerHTML = `${text.substring(0, start)}<span class="highlight">${text.substring(start, end)}</span>${text.substring(end)}`;
            const h = viewer.querySelector('.highlight');
            if (h) h.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function togglePlay() {
            if (synth.paused) { synth.resume(); updateBtn(true); }
            else if (synth.speaking) { synth.pause(); updateBtn(false); }
            else startSpeaking(currentIdx);
        }

        function stopTTS() { 
            synth.cancel(); 
            currentIdx = 0; 
            document.getElementById('progressSlider').value = 0;
            viewer.innerHTML = originalText || viewer.innerText; 
            updateBtn(false); 
        }

        function updateBtn(p) { document.getElementById('playBtn').innerText = p ? "⏸ Pause" : "▶ Play"; }

        // --- UTILS & FILES ---
        async function translateText() {
            const targetLang = document.getElementById('langSelect').value;
            let fullText = beautifyText(viewer.innerText);
            if (fullText.length < 5) return;
            loader.classList.remove('hidden');
            const chunks = [];
            for (let i = 0; i < fullText.length; i += 1500) chunks.push(fullText.substring(i, i + 1500));
            let results = [];
            try {
                for (let i = 0; i < chunks.length; i++) {
                    const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${targetLang}&dt=t&q=${encodeURIComponent(chunks[i])}`);
                    const d = await res.json();
                    results.push(d[0].map(x => x[0]).join(""));
                    await sleep(500);
                }
                const final = beautifyText(results.join(" "));
                viewer.innerText = final;
                originalText = final;
            } catch (err) { alert("Rate limit. Wait 1 min."); }
            loader.classList.add('hidden');
        }

        function downloadText() {
            const blob = new Blob([viewer.innerText], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `DocuVoice_${Date.now()}.txt`;
            a.click();
        }

        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            loader.classList.remove('hidden');
            if (file.name.endsWith('.docx')) {
                const r = new FileReader();
                r.onload = (e) => mammoth.extractRawText({arrayBuffer: e.target.result}).then(res => { viewer.innerText = beautifyText(res.value); originalText = viewer.innerText; loader.classList.add('hidden'); });
                r.readAsArrayBuffer(file);
            } else if (file.name.endsWith('.pdf')) {
                const typedarray = new Uint8Array(await file.arrayBuffer());
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                let t = "";
                for (let i = 1; i <= pdf.numPages; i++) {
                    const p = await pdf.getPage(i);
                    const c = await p.getTextContent();
                    t += c.items.map(s => s.str).join(" ") + "\n";
                }
                viewer.innerText = beautifyText(t);
                originalText = viewer.innerText;
                loader.classList.add('hidden');
            } else {
                const r = new FileReader();
                r.onload = (e) => { viewer.innerText = beautifyText(e.target.result); originalText = viewer.innerText; loader.classList.add('hidden'); };
                r.readAsText(file);
            }
        });

        document.getElementById('speedRange').addEventListener('input', (e) => {
            document.getElementById('speedValue').innerText = parseFloat(e.target.value).toFixed(1) + "x";
            if (synth.speaking) startSpeaking(currentIdx);
        });

        renderLibrary();
        window.speechSynthesis.onvoiceschanged = () => synth.getVoices();

        document.addEventListener('DOMContentLoaded', () => {
            const chatCircle = document.getElementById('chat-circle');
            const chatBox = document.querySelector('.chat-box');
            const chatClose = document.querySelector('.chat-box-toggle');
            const chatForm = document.querySelector('.chat-input form');
            const chatInput = document.getElementById('chat-input');
            const chatLogs = document.querySelector('.chat-logs');

            // Toggle Chatbox
            chatCircle.addEventListener('click', () => {
                chatBox.style.display = 'block';
                chatCircle.style.display = 'none';
            });

            chatClose.addEventListener('click', () => {
                chatBox.style.display = 'none';
                chatCircle.style.display = 'block';
            });

            // Handle Sending Message
            chatForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const msg = chatInput.value;
                if (msg.trim() === '') return;

                appendMessage(msg, 'user');
                chatInput.value = '';

                // Simulate a bot response
                setTimeout(() => {
                    appendMessage("I'm a demo bot! I received: " + msg, 'bot');
                }, 1000);
            });

            function appendMessage(text, type) {
                const msgDiv = document.createElement('div');
                msgDiv.classList.add('chat-msg', type);
                msgDiv.innerHTML = `<div class="cm-msg-text">${text}</div>`;
                chatLogs.appendChild(msgDiv);
                chatLogs.scrollTop = chatLogs.scrollHeight;
            }
        });

    </script>
</body>
</html>
